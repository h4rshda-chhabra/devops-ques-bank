name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Backend Dependencies
      run: |
        cd backend
        npm install

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm install

    - name: Build Backend
      run: |
        cd backend
        # Add build/lint steps here if needed

    - name: Build Frontend
      run: |
        cd frontend
        npm run build

    - name: Build Docker Images
      run: |
        docker build -t devops-prep-backend ./backend
        docker build -t devops-prep-frontend ./frontend
